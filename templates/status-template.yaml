# BMAD Status Template — Canonical Reference
# This file is the single source of truth for BMAD project state.
# Location: skills/bmad-method/templates/status-template.yaml
#
# Used by: engine.mjs init() — reads this template and replaces {{project_name}} placeholders.
# Do NOT edit this file unless changing the canonical structure for all BMAD projects.

# ── Core Identity ─────────────────────────────────────────────────────────────
project: "{{project_name}}"           # (required) Project name
phase: planning                       # (required) one of: planning | development | testing | release
progress: 0                           # (required) integer 0-100
last_updated: "{{date}}"              # (required) ISO date YYYY-MM-DD — updated on every action

# ── Chain Protocol (CRITICAL) ─────────────────────────────────────────────────
# These three fields MUST stay in sync. Inconsistency = broken chain.
next_action: "Create a PRD with bmad plan prd"   # (required) Human-readable next step
next_command: "bmad plan prd"                    # (required) Executable command
next_role: "pm"                                  # (required) Role that executes (pm|architect|dev|reviewer|tester|scrum|designer)
active_role: "pm"                                # (optional) Currently active role

# ── Dependencies (optional) ───────────────────────────────────────────────────
# List projects this project depends on. Use for blocking/optional dependencies.
# dependencies:
#   - project: other-project
#     status: blocking    # "blocking" or "optional"
#     reason: "Need X before Y"
#     satisfied: false    # Auto-set by BMAD when dependency is complete
dependencies: []

# ── Phase Tracking ────────────────────────────────────────────────────────────
# Exactly these 4 phases, in this order
phases:
  - name: planning
    status: in_progress      # one of: done | in_progress | upcoming
  - name: development
    status: upcoming
  - name: testing
    status: upcoming
  - name: release
    status: upcoming

# ── Strategic Dimensions (updated at end of every action) ─────────────────────
# Max 4 bullet points each. Updated alongside other status fields.
marketing: []

product: []

far_vision: []

# ── Artifacts ─────────────────────────────────────────────────────────────────
# Track key deliverables. Status: done | in_progress | missing
artifacts:
  prd: missing
  architecture: missing
  tech-spec: missing

# ── Sprints ───────────────────────────────────────────────────────────────────
# Sprint ID format: S{sprint_number}-{sequence:02d} (e.g., S1-03, S12-01)
sprints: []
# Example:
# sprints:
#   - id: 1
#     goal: "Foundation sprint — core architecture and setup"
#     status: completed
#     stories:
#       - id: S1-01
#         title: "Project initialization"
#         status: complete
#         tests_executed: true
#         test_output: "bmad/artifacts/test-report-S1-01.md"
#         test_result: pass
#       - id: S1-02
#         title: "Core module implementation"
#         status: in_progress
#         tests_executed: false
#         test_output: null
#         test_result: null

# ── QA / Bugs (optional) ──────────────────────────────────────────────────────
# Track known issues
qa:
  bugs: []
  # Example:
  # bugs:
  #   - "Login fails on Safari mobile"
  #   - "Export timeout for large datasets"

# ── Notes ─────────────────────────────────────────────────────────────────────
#
# CHAIN PROTOCOL VALIDATION:
# - next_role "pm" → next_command must be PM command (bmad plan prd, bmad plan spec)
# - next_role "dev" → next_command must be dev command (bmad continue, bmad dev story)
# - next_role "tester" → next_command must be test command (bmad test unit, bmad test e2e)
# - next_role "scrum" → next_command must be scrum command (bmad sprint, bmad status)
# - Inconsistency = HARD BLOCKER
#
# STORY COMPLETION RULE:
# - A story CANNOT be marked "complete" without tests_executed: true
# - test_output must reference an actual test report artifact
# - test_result must be "pass" for story completion
#
# DIMENSION UPDATES:
# - marketing: External-facing progress (demos, copy, launch readiness)
# - product: Product decisions (user flows, blockers, features)
# - far_vision: Strategic direction (future features, architecture, research)
# - All three updated at end of every action
#
# YAML FORMATTING:
# - Use double quotes for values with special chars: : # { } [ ] , & * ? | - < > = ! % @ \
# - Always 2-space indentation, no tabs
# - No block scalars (>- | -) in status.yaml — inline quoted strings only
